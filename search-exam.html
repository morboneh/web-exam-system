<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Exam | Exam Management Web App</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="border-bottom bg-white">
    <nav class="container d-flex align-items-center justify-content-between py-3" aria-label="Search exam navigation">
      <a class="text-decoration-none fw-bold" href="student-dashboard.html">Exam Management</a>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="student-dashboard.html">Student Dashboard</a>
        <button id="logoutButton" class="btn btn-outline-danger" type="button">Logout</button>
      </div>
    </nav>
  </header>

  <main class="container py-5">
    <div class="mb-4">
      <h1>Search Exams</h1>
      <p class="text-secondary mb-0">Welcome, <span id="studentName"></span>. Search by title or exam code.</p>
    </div>

    <section class="card mb-4" aria-labelledby="search-heading">
      <div class="card-body">
        <h2 id="search-heading" class="h4 mb-3">Find an Exam</h2>
        <form id="searchForm">
          <label for="searchInput" class="form-label">Search by title or code</label>
          <div class="input-group">
            <input id="searchInput" class="form-control" type="search" placeholder="Enter title or code" autocomplete="off">
            <button class="btn btn-primary" type="submit">Search</button>
          </div>
        </form>
      </div>
    </section>

    <!-- Search results are populated with exams that are available to the current student. -->
    <section aria-labelledby="results-heading">
      <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
        <h2 id="results-heading" class="h3 mb-0">Available Exams</h2>
        <p id="resultsCount" class="text-secondary mb-0"></p>
      </div>
      <div id="searchMessage" class="form-message mb-3" aria-live="polite"></div>
      <div id="searchResults" class="row g-3"></div>
    </section>
  </main>
  <script type="module" src="js/pages/searchExamPage.js"></script>
</body>
</html>
