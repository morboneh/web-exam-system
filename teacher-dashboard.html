<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard | Exam Management Web App</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="border-bottom bg-white">
    <nav class="container d-flex align-items-center justify-content-between py-3" aria-label="Teacher navigation">
      <a class="text-decoration-none fw-bold" href="teacher-dashboard.html">Exam Management</a>
      <button id="logoutButton" class="btn btn-outline-danger" type="button">Logout</button>
    </nav>
  </header>

  <main class="container py-5">
    <div class="mb-4">
      <h1>Teacher Dashboard</h1>
      <p class="text-secondary mb-0">Welcome, <span id="teacherName"></span>.</p>
    </div>

    <div id="dashboardMessage" class="form-message mb-3" aria-live="polite"></div>

    <!-- This list is populated by JavaScript with exams owned by the logged-in teacher. -->
    <section aria-labelledby="my-exams-heading">
      <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
        <h2 id="my-exams-heading" class="h3 mb-0">My Exams</h2>
        <button id="openCreateExamButton" class="btn btn-primary" type="button">Create Exam</button>
      </div>
      <div id="examList" class="row g-3"></div>
    </section>
  </main>

  <!-- Dialog used for creating an exam and optional initial questions. -->
  <dialog id="createExamDialog" class="exam-dialog">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h2 class="h4 mb-0">Create Exam</h2>
      <button id="closeCreateExamButton" class="btn-close" type="button" aria-label="Close"></button>
    </div>

    <div id="modalMessage" class="form-message" aria-live="polite"></div>

    <form id="createExamForm">
      <div class="row g-3">
        <div class="col-md-6">
          <label for="title" class="form-label">Title</label>
          <input id="title" class="form-control" type="text" required>
        </div>

        <div class="col-md-6">
          <label for="category" class="form-label">Category</label>
          <input id="category" class="form-control" type="text" required>
        </div>

        <div class="col-12">
          <label for="description" class="form-label">Description</label>
          <textarea id="description" class="form-control" rows="3" required></textarea>
        </div>

        <div class="col-md-6">
          <label for="duration" class="form-label">Duration (minutes)</label>
          <input id="duration" class="form-control" type="number" min="1" required>
        </div>
      </div>

      <hr class="my-4">

      <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
        <h3 class="h5 mb-0">Initial Questions</h3>
        <button id="addQuestionButton" class="btn btn-outline-primary btn-sm" type="button">
          Add Another Question
        </button>
      </div>

      <p id="noQuestionsMessage" class="text-secondary small">Questions are optional.</p>
      <div id="questionFields"></div>

      <div class="d-flex justify-content-end gap-2 mt-4">
        <button id="cancelCreateExamButton" class="btn btn-outline-secondary" type="button">Cancel</button>
        <button class="btn btn-primary" type="submit">Save Exam</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="js/pages/teacherDashboardPage.js"></script>
</body>
</html>
