<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard | Exam Management Web App</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="border-bottom bg-white">
    <nav class="container d-flex align-items-center justify-content-between py-3" aria-label="Teacher navigation">
      <a class="text-decoration-none fw-bold" href="teacher-dashboard.html">Exam Management</a>
      <button id="logoutButton" class="btn btn-outline-danger" type="button">Logout</button>
    </nav>
  </header>

  <main class="container py-5">
    <div class="mb-4">
      <h1>Teacher Dashboard</h1>
      <p class="text-secondary mb-0">Welcome, <span id="teacherName"></span>.</p>
    </div>

    <div id="dashboardMessage" class="form-message mb-3" aria-live="polite"></div>

    <section class="card mb-5" aria-labelledby="create-exam-heading">
      <div class="card-body">
        <h2 id="create-exam-heading" class="h4 mb-3">Create Exam</h2>

        <form id="createExamForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="title" class="form-label">Title</label>
              <input id="title" class="form-control" type="text" required>
            </div>

            <div class="col-md-6">
              <label for="category" class="form-label">Category</label>
              <input id="category" class="form-control" type="text" required>
            </div>

            <div class="col-12">
              <label for="description" class="form-label">Description</label>
              <textarea id="description" class="form-control" rows="3" required></textarea>
            </div>

            <div class="col-md-6">
              <label for="examCode" class="form-label">Exam Code</label>
              <input id="examCode" class="form-control" type="text" required>
            </div>

            <div class="col-md-6">
              <label for="duration" class="form-label">Duration (minutes)</label>
              <input id="duration" class="form-control" type="number" min="1" required>
            </div>

            <div class="col-12">
              <button class="btn btn-primary" type="submit">Create Exam</button>
            </div>
          </div>
        </form>
      </div>
    </section>

    <section aria-labelledby="my-exams-heading">
      <h2 id="my-exams-heading" class="h3 mb-3">My Exams</h2>
      <div id="examList" class="row g-3"></div>
    </section>
  </main>
  <script type="module" src="js/pages/teacherDashboardPage.js"></script>
</body>
</html>
