<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Exam Management Web App</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="auth-page">
    <div class="container py-4">
      <section class="card auth-card mx-auto">
        <div class="card-header bg-primary text-white text-center">
          Login
        </div>

        <div class="card-body">
          <p class="text-muted text-center mb-3">Enter your account details to continue.</p>

          <div id="loginMessage" class="form-message" aria-live="polite"></div>

          <form id="loginForm">
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" id="email" name="email" class="form-control" autocomplete="email" required>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" id="password" name="password" class="form-control" autocomplete="current-password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Login</button>
          </form>

          <p class="text-center mt-3 mb-0">
            New here? <a href="register.html">Create an account</a>
          </p>
        </div>
      </section>
    </div>
  </main>
  <script type="module" src="js/pages/loginPage.js"></script>
</body>
</html>
