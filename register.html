<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Exam Management Web App</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="auth-page">
    <div class="container py-4">
      <section class="card auth-card mx-auto">
        <div class="card-header bg-primary text-white text-center">
          Create Account
        </div>

        <div class="card-body">
          <p class="text-muted text-center mb-3">Register as a teacher or student.</p>

          <div id="registerMessage" class="form-message" aria-live="polite"></div>

          <form id="registerForm">
            <div class="mb-3">
              <label for="fullName" class="form-label">Full Name</label>
              <input type="text" id="fullName" name="fullName" class="form-control" autocomplete="name" required>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" id="email" name="email" class="form-control" autocomplete="email" required>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" id="password" name="password" class="form-control" autocomplete="new-password" required>
            </div>

            <div class="mb-3">
              <label for="role" class="form-label">Role</label>
              <select id="role" name="role" class="form-select" required>
                <option value="" disabled selected>Choose role</option>
                <option value="teacher">Teacher</option>
                <option value="student">Student</option>
              </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">Register</button>
          </form>

          <p class="text-center mt-3 mb-0">
            Already have an account? <a href="login.html">Log in</a>
          </p>
        </div>
      </section>
    </div>
  </main>
  <script type="module" src="js/pages/registerPage.js"></script>
</body>
</html>
